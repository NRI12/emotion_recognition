max_epochs: 50
lr: 1.0e-3
batch_size: 32
num_workers: 0      # set >0 on Linux/Mac; keep 0 on Windows to avoid multiprocessing issues
patience: 10        # EarlyStopping patience (epochs)
weight_decay: 1.0e-4
extraction_workers: 4  # parallel workers for classical feature extraction (ProcessPoolExecutor)
